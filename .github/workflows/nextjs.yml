name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PNPM_ENABLE_PREPOST_SCRIPTS: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      # 🔥 CRITICAL FIX (this is what solves your error)
      - name: Install dependencies
        run: pnpm install --unsafe-perm --no-frozen-lockfile

      - name: Build project
        run: pnpm build
