<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->
<header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="text-xl font-bold">📄 CV Builder</h1>

    <button onclick="toggleLanguage()" class="bg-white text-blue-600 px-3 py-1 rounded font-bold">
      🌐 AR / EN
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-6xl mx-auto p-6 grid lg:grid-cols-2 gap-8">

<!-- INPUT -->
<section class="bg-white p-6 rounded-xl shadow">

<h2 id="title-personal" class="text-2xl font-bold mb-4 border-b pb-2">
Personal Information
</h2>

<form class="space-y-3">

<input id="in-name" class="w-full border p-2 rounded" placeholder="Full Name">
<input id="in-title" class="w-full border p-2 rounded" placeholder="Title">

<div class="grid grid-cols-2 gap-2">
<input id="in-email" class="border p-2 rounded" placeholder="Email">
<input id="in-phone" class="border p-2 rounded" placeholder="Phone">
</div>

<textarea id="in-summary" class="w-full border p-2 rounded" placeholder="Summary"></textarea>
<textarea id="in-experience" class="w-full border p-2 rounded" placeholder="Experience"></textarea>
<textarea id="in-education" class="w-full border p-2 rounded" placeholder="Education"></textarea>

<input id="in-skills" class="w-full border p-2 rounded" placeholder="Skills (comma separated)">

</form>

<button onclick="downloadPDF()"
class="mt-4 w-full bg-green-600 text-white py-3 rounded font-bold">
📥 Download PDF
</button>

</section>

<!-- PREVIEW (ALWAYS ENGLISH) -->
<section>

<div id="cv-preview" class="bg-white p-8 rounded-xl shadow border text-left">

<!-- HEADER -->
<div class="border-b-4 border-blue-600 pb-4 mb-6">

<h1 id="out-name" class="text-4xl font-bold text-gray-900">John Doe</h1>
<p id="out-title" class="text-blue-600 text-xl">Full Stack Developer</p>

<div class="text-sm text-gray-600 flex gap-4 mt-2">
<span id="out-email">📧 john@example.com</span>
<span id="out-phone">📞 +1 234 567 890</span>
</div>

</div>

<!-- SECTIONS (FIXED ENGLISH ONLY) -->
<div class="mb-4">
<h3 class="font-bold uppercase border-b mb-2">Summary</h3>
<p id="out-summary">Brief overview...</p>
</div>

<div class="mb-4">
<h3 class="font-bold uppercase border-b mb-2">Experience</h3>
<p id="out-experience"></p>
</div>

<div class="mb-4">
<h3 class="font-bold uppercase border-b mb-2">Education</h3>
<p id="out-education"></p>
</div>

<div>
<h3 class="font-bold uppercase border-b mb-2">Skills</h3>
<div id="out-skills" class="flex flex-wrap gap-2"></div>
</div>

</div>

</section>

</main>

<script>
let currentLang = "en";

const translations = {
  en: {
    personal: "Personal Information",
    placeholders: {
      name: "Full Name",
      title: "Title",
      email: "Email",
      phone: "Phone",
      summary: "Summary",
      experience: "Experience",
      education: "Education",
      skills: "Skills (comma separated)"
    }
  },

  ar: {
    personal: "المعلومات الشخصية",
    placeholders: {
      name: "الاسم الكامل",
      title: "المسمى الوظيفي",
      email: "البريد الإلكتروني",
      phone: "رقم الهاتف",
      summary: "ملخص",
      experience: "الخبرات",
      education: "التعليم",
      skills: "المهارات (مفصولة بفواصل)"
    }
  }
};

function toggleLanguage() {
  currentLang = currentLang === "en" ? "ar" : "en";
  applyLanguage();
}

function applyLanguage() {
  const t = translations[currentLang];

  document.getElementById("title-personal").innerText = t.personal;

  document.getElementById("in-name").placeholder = t.placeholders.name;
  document.getElementById("in-title").placeholder = t.placeholders.title;
  document.getElementById("in-email").placeholder = t.placeholders.email;
  document.getElementById("in-phone").placeholder = t.placeholders.phone;
  document.getElementById("in-summary").placeholder = t.placeholders.summary;
  document.getElementById("in-experience").placeholder = t.placeholders.experience;
  document.getElementById("in-education").placeholder = t.placeholders.education;
  document.getElementById("in-skills").placeholder = t.placeholders.skills;
}

function updatePreview() {

document.getElementById("out-name").innerText =
document.getElementById("in-name").value || "John Doe";

document.getElementById("out-title").innerText =
document.getElementById("in-title").value || "Full Stack Developer";

document.getElementById("out-email").innerText =
"📧 " + (document.getElementById("in-email").value || "john@example.com");

document.getElementById("out-phone").innerText =
"📞 " + (document.getElementById("in-phone").value || "+1 234 567 890");

document.getElementById("out-summary").innerText =
document.getElementById("in-summary").value || "Brief overview...";

document.getElementById("out-experience").innerText =
document.getElementById("in-experience").value;

document.getElementById("out-education").innerText =
document.getElementById("in-education").value;

// Skills
const skills = document.getElementById("in-skills").value.split(",");
const container = document.getElementById("out-skills");

container.innerHTML = "";

skills.forEach(skill => {
if (skill.trim()) {
const span = document.createElement("span");
span.className = "bg-gray-100 border px-3 py-1 rounded-full text-sm";
span.innerText = skill.trim();
container.appendChild(span);
}
});
}

function downloadPDF() {
const element = document.getElementById("cv-preview");

const opt = {
margin: 0.5,
filename: 'cv.pdf',
image: { type: 'jpeg', quality: 0.98 },
html2canvas: { scale: 2 },
jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
};

html2pdf().set(opt).from(element).save();
}

window.updatePreview = updatePreview;
window.downloadPDF = downloadPDF;
window.toggleLanguage = toggleLanguage;

document.querySelectorAll("input, textarea").forEach(el => {
el.addEventListener("input", updatePreview);
});

applyLanguage();
updatePreview();
</script>

</body>
</html>
